<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식물 성장 타이머</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 기본 초기화 및 부드러운 폰트 적용 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f6f4;
            padding: 20px;
        }

        /* 메인 카드 레이아웃 (두 번째 이미지 스타일) */
        .timer-card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 380px;
            padding: 40px 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 식물 아이콘 및 라벨 디자인 */
        .plant-container {
            margin-bottom: 12px;
        }

        .plant-icon {
            font-size: 72px;
            line-height: 1;
            margin-bottom: 12px;
            display: block;
            transition: transform 0.3s ease;
        }

        .plant-icon.grow-animation {
            transform: scale(1.15);
        }

        .status-badge {
            background-color: #ebf7ed;
            color: #4caf50;
            font-weight: 600;
            font-size: 14px;
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-block;
        }

        /* 부드러운 안내 메시지 */
        .hint-text {
            color: #8e9297;
            font-size: 14px;
            margin-bottom: 24px;
            font-weight: 400;
        }

        /* 압도적이고 직관적인 타이머 숫자 대형화 */
        .timer-display {
            font-size: 56px;
            font-weight: 800;
            color: #1a1c1e;
            letter-spacing: -1px;
            margin-bottom: 24px;
            font-variant-numeric: tabular-nums;
        }

        /* 구분선 */
        .divider {
            width: 100%;
            height: 4px;
            background-color: #f1f3f5;
            border-radius: 2px;
            margin-bottom: 28px;
        }

        /* 입력 폼 그리드 및 스타일 */
        .input-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
            color: #8e9297;
            font-size: 14px;
        }

        .time-input {
            width: 64px;
            height: 40px;
            border: 1px solid #e1e4e6;
            border-radius: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            color: #1a1c1e;
            background-color: #ffffff;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .time-input:focus {
            border-color: #4caf50;
        }

        /* 입력창 화살표 제거 */
        .time-input::-webkit-outer-spin-button,
        .time-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* 버튼 그룹 배치 */
        .button-group {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-bottom: 24px;
        }

        .btn {
            flex: 1;
            height: 48px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn i {
            font-size: 13px;
        }

        /* 시작 버튼 (진한 초록색) */
        .btn-start {
            background-color: #4caf50;
            color: #ffffff;
            flex: 1.2;
        }

        .btn-start:hover {
            background-color: #439a46;
        }

        /* 일시정지 버튼 (연한 살구빛/오렌지색) */
        .btn-pause {
            background-color: #ffe8cc;
            color: #ff922b;
        }

        .btn-pause:hover {
            background-color: #ffd8a8;
        }

        .btn-pause:disabled {
            background-color: #f1f3f5;
            color: #ced4da;
            cursor: not-allowed;
        }

        /* 단계 취소 버튼 (회색빛 둥근 UX 디자인) */
        .btn-undo {
            background-color: #f1f3f5;
            color: #495057;
        }

        .btn-undo:hover {
            background-color: #e9ecef;
        }

        /* 하단 인디케이터 도트 */
        .indicator-dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #e1e4e6;
            border-radius: 50%;
        }

        .dot.active {
            background-color: #cbd5e1;
        }
    </style>
</head>
<body>

    <div class="timer-card">
        <!-- 식물 상태 영역 -->
        <div class="plant-container">
            <span id="plantIcon" class="plant-icon">🏺</span>
            <div id="statusBadge" class="status-badge">빈 화분</div>
        </div>
        
        <p class="hint-text">시간을 설정하고 첫 씨앗을 틔워보세요!</p>

        <!-- 대형 타이머 표시 -->
        <div id="timerDisplay" class="timer-display">00:00:00</div>

        <div class="divider"></div>

        <!-- 시간 입력 인터페이스 -->
        <div class="input-group">
            <input type="number" id="hoursInput" class="time-input" value="0" min="0" max="99">
            <span>시간</span>
            <input type="number" id="minutesInput" class="time-input" value="25" min="0" max="59">
            <span>분</span>
        </div>

        <!-- 액션 버튼 컴포넌트 -->
        <div class="button-group">
            <button id="startBtn" class="btn btn-start">
                <i class="fa-solid fa-play"></i> 시작
            </button>
            <button id="pauseBtn" class="btn btn-pause" disabled>
                <i class="fa-solid fa-pause"></i> 일시정지
            </button>
            <button id="undoBtn" class="btn btn-undo">
                <i class="fa-solid fa-arrow-rotate-left"></i> 단계 취소
            </button>
        </div>

        <!-- 하단 장식용 도트 바 -->
        <div class="indicator-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        // 식물 성장 단계 상수화 정의
        const GROWTH_STAGES = [
            { level: 0, icon: '🏺', text: '빈 화분' },
            { level: 1, icon: '🌱', text: '새싹 단계' },
            { level: 2, icon: '🌿', text: '성장 단계' },
            { level: 3, icon: '🌸', text: '개화 완료!' }
        ];

        let currentStageIndex = 0;
        let countdownInterval = null;
        let totalSecondsLeft = 0;
        let isPaused = false;

        // DOM 요소 캐싱
        const plantIcon = document.getElementById('plantIcon');
        const statusBadge = document.getElementById('statusBadge');
        const timerDisplay = document.getElementById('timerDisplay');
        const hoursInput = document.getElementById('hoursInput');
        const minutesInput = document.getElementById('minutesInput');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const undoBtn = document.getElementById('undoBtn');

        // 타이머 시각화 업데이트 함수
        function updateDisplay(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            
            timerDisplay.textContent = 
                `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // 식물 UI 갱신 및 애니메이션 로직
        function updatePlantUI() {
            const stage = GROWTH_STAGES[currentStageIndex];
            plantIcon.textContent = stage.icon;
            statusBadge.textContent = stage.text;
            
            // 시각적 피드백 효과 유도
            plantIcon.classList.add('grow-animation');
            setTimeout(() => {
                plantIcon.classList.remove('grow-animation');
            }, 300);
        }

        // 타이머 시작 및 재개 로직
        function startTimer() {
            if (!isPaused) {
                const hours = parseInt(hoursInput.value) || 0;
                const minutes = parseInt(minutesInput.value) || 0;
                totalSecondsLeft = (hours * 3600) + (minutes * 60);

                if (totalSecondsLeft <= 0) {
                    alert('타이머 시간을 설정해 주세요!');
                    return;
                }
            }

            // UI 제어 상태 변환
            startBtn.disabled = true;
            pauseBtn.disabled = false;
            hoursInput.disabled = true;
            minutesInput.disabled = true;
            isPaused = false;

            countdownInterval = setInterval(() => {
                if (totalSecondsLeft > 0) {
                    totalSecondsLeft--;
                    updateDisplay(totalSecondsLeft);
                } else {
                    clearInterval(countdownInterval);
                    handleTimerComplete();
                }
            }, 1000);
        }

        // 일시정지 처리 핸들러
        function pauseTimer() {
            clearInterval(countdownInterval);
            isPaused = true;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
        }

        // 타이머 만료 시 성장 스텝 제어
        function handleTimerComplete() {
            if (currentStageIndex < GROWTH_STAGES.length - 1) {
                currentStageIndex++;
                updatePlantUI();
            }
            resetInputState();
            alert('집중 시간이 완료되었어요! 식물이 한 단계 성장했습니다! 🎉');
        }

        // 취소(Undo) 기능의 UX 예외 처리 로직 반영
        function undoStage() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }
            
            if (currentStageIndex > 0) {
                currentStageIndex--;
                updatePlantUI();
                alert('이전 단계로 안전하게 되돌렸습니다.');
            } else {
                alert('현재 가장 첫 번째 단계(빈 화분)입니다.');
            }
            resetInputState();
        }

        // 입력 폼 초기화 전용 공통 함수
        function resetInputState() {
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            hoursInput.disabled = false;
            minutesInput.disabled = false;
            isPaused = false;
            updateDisplay(0);
        }

        // 이벤트 리스너 바인딩
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        undoBtn.addEventListener('click', undoStage);

        // 초기 화면 세팅
        updateDisplay(0);
    </script>
</body>
</html>
